name: Release Plugin

on:
  push:
    tags: ['*']

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Bundle release (embed WASM in main.js)
        run: node scripts/bundle-release.js

      - name: Attest build provenance (main.js)
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: build/main.js

      - name: Attest build provenance (manifest.json)
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: build/manifest.json

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "See [CHANGELOG](https://dvrch.github.io/mergdown2tex/) for details." \
            build/main.js build/manifest.json
