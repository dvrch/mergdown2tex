site_name: MergDown2TeX Documentation
site_url: https://dvrch.github.io/mergdown2tex/
site_description: Complete documentation for MergDown2TeX - Merge everything into LaTeX
site_author: DJ Victorien

repo_name: dvrch/mergdown2tex
repo_url: https://github.com/dvrch/mergdown2tex

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github
  logo: assets/logo-icon.png

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dvrch
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/dvrch

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Configuration: getting-started/configuration.md
  - Features:
    - Overview: features/overview.md
    - Embed Expansion: features/embeds.md
    - Citations: features/citations.md
    - Equations: features/equations.md
    - Mermaid Diagrams: features/mermaid.md
    - Cross-References: features/cross-references.md
  - Compilation:
    - PDF: compilation/pdf.md
    - DOCX: compilation/docx.md
    - LaTeX: compilation/latex.md
  - Reference:
    - Commands: reference/commands.md
    - Settings: reference/settings.md
    - Architecture: reference/architecture.md
  - Troubleshooting: troubleshooting.md
  - FAQ: faq.md
